services:
  mysql:
    image: mysql:8.4
    container_name: tarae-mysql
    ports:
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: tarae1234
      MYSQL_DATABASE: tarae
      MYSQL_USER: tarae
      MYSQL_PASSWORD: tarae1234
    volumes:
      - tarae-mysql-data:/var/lib/mysql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci

volumes:
  tarae-mysql-data:
