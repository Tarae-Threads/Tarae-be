<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{admin/layout/base :: layout(${type == 'brands' ? '브랜드 관리' : (type == 'tags' ? '태그 관리' : '카테고리 관리')}, ~{::body})}">
<body>

<!-- 카테고리 -->
<div th:if="${type == 'categories'}" class="card table-wrap">
    <div class="master-toolbar">
        <form method="post" th:action="@{/admin/masters/categories}">
            <input type="text" name="name" placeholder="새 카테고리 이름" required/>
            <button type="submit" class="btn btn--primary">+ 추가</button>
        </form>
        <input type="text" class="master-toolbar__search" data-filter="categories-row"
               placeholder="이름 검색"/>
    </div>
    <table th:if="${not #lists.isEmpty(categories)}">
        <thead>
        <tr>
            <th style="width: 80px;">ID</th>
            <th>이름</th>
            <th style="width: 120px;">사용 장소</th>
            <th style="width: 200px;">관리</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="c : ${categories}" class="categories-row" th:data-name="${c.name}">
            <td th:text="${c.id}">1</td>
            <td>
                <span th:id="'category-name-' + ${c.id}" th:text="${c.name}">이름</span>
                <form th:id="'category-edit-' + ${c.id}"
                      th:action="@{/admin/masters/categories/{id}(id=${c.id})}"
                      method="post"
                      class="inline-edit-form">
                    <input type="text" name="name" th:value="${c.name}" required/>
                    <button type="submit" class="btn btn--primary btn--sm">저장</button>
                </form>
            </td>
            <td>
                <span th:text="${c.placeCount} + '개'">0개</span>
            </td>
            <td class="action-cell">
                <button type="button" class="btn btn--secondary btn--sm"
                        th:attr="data-toggle-target='category-' + ${c.id}">수정</button>
                <form th:action="@{/admin/masters/categories/{id}/delete(id=${c.id})}"
                      method="post" class="form-inline">
                    <button type="submit" class="btn btn--destructive btn--sm btn--delete"
                            th:data-place-count="${c.placeCount}">삭제</button>
                </form>
            </td>
        </tr>
        </tbody>
    </table>
    <p th:if="${#lists.isEmpty(categories)}" class="empty-state">
        카테고리가 없습니다.
    </p>
</div>

<!-- 태그 -->
<div th:if="${type == 'tags'}" class="card table-wrap">
    <div class="master-toolbar">
        <form method="post" th:action="@{/admin/masters/tags}">
            <input type="text" name="name" placeholder="새 태그 이름" required/>
            <button type="submit" class="btn btn--primary">+ 추가</button>
        </form>
        <input type="text" class="master-toolbar__search" data-filter="tags-row"
               placeholder="이름 검색"/>
    </div>
    <table th:if="${not #lists.isEmpty(tags)}">
        <thead>
        <tr>
            <th style="width: 80px;">ID</th>
            <th>이름</th>
            <th style="width: 120px;">사용 장소</th>
            <th style="width: 200px;">관리</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="t : ${tags}" class="tags-row" th:data-name="${t.name}">
            <td th:text="${t.id}">1</td>
            <td>
                <span th:id="'tag-name-' + ${t.id}" th:text="${t.name}">이름</span>
                <form th:id="'tag-edit-' + ${t.id}"
                      th:action="@{/admin/masters/tags/{id}(id=${t.id})}"
                      method="post"
                      class="inline-edit-form">
                    <input type="text" name="name" th:value="${t.name}" required/>
                    <button type="submit" class="btn btn--primary btn--sm">저장</button>
                </form>
            </td>
            <td>
                <span th:text="${t.placeCount} + '개'">0개</span>
            </td>
            <td class="action-cell">
                <button type="button" class="btn btn--secondary btn--sm"
                        th:attr="data-toggle-target='tag-' + ${t.id}">수정</button>
                <form th:action="@{/admin/masters/tags/{id}/delete(id=${t.id})}"
                      method="post" class="form-inline">
                    <button type="submit" class="btn btn--destructive btn--sm btn--delete"
                            th:data-place-count="${t.placeCount}">삭제</button>
                </form>
            </td>
        </tr>
        </tbody>
    </table>
    <p th:if="${#lists.isEmpty(tags)}" class="empty-state">
        태그가 없습니다.
    </p>
</div>

<!-- 브랜드 -->
<div th:if="${type == 'brands'}" class="card table-wrap">
    <div class="master-toolbar">
        <form method="post" th:action="@{/admin/masters/brands}">
            <input type="text" name="name" placeholder="새 브랜드 이름" required/>
            <select name="type">
                <option th:each="bt : ${brandTypes}" th:value="${bt}" th:text="${bt}">YARN</option>
            </select>
            <button type="submit" class="btn btn--primary">+ 추가</button>
        </form>
        <input type="text" class="master-toolbar__search" data-filter="brands-row"
               placeholder="이름 검색"/>
    </div>
    <table th:if="${not #lists.isEmpty(brands)}">
        <thead>
        <tr>
            <th style="width: 80px;">ID</th>
            <th>이름</th>
            <th style="width: 140px;">타입</th>
            <th style="width: 120px;">사용 장소</th>
            <th style="width: 200px;">관리</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="b : ${brands}" class="brands-row" th:data-name="${b.name}">
            <td th:text="${b.id}">1</td>
            <td>
                <span th:id="'brand-name-' + ${b.id}" th:text="${b.name}">이름</span>
                <form th:id="'brand-edit-' + ${b.id}"
                      th:action="@{/admin/masters/brands/{id}(id=${b.id})}"
                      method="post"
                      class="inline-edit-form">
                    <input type="text" name="name" th:value="${b.name}" required/>
                    <select name="type">
                        <option th:each="bt : ${brandTypes}"
                                th:value="${bt}"
                                th:text="${bt}"
                                th:selected="${bt == b.type}">YARN</option>
                    </select>
                    <button type="submit" class="btn btn--primary btn--sm">저장</button>
                </form>
            </td>
            <td th:text="${b.type}">YARN</td>
            <td>
                <span th:text="${b.placeCount} + '개'">0개</span>
            </td>
            <td class="action-cell">
                <button type="button" class="btn btn--secondary btn--sm"
                        th:attr="data-toggle-target='brand-' + ${b.id}">수정</button>
                <form th:action="@{/admin/masters/brands/{id}/delete(id=${b.id})}"
                      method="post" class="form-inline">
                    <button type="submit" class="btn btn--destructive btn--sm btn--delete"
                            th:data-place-count="${b.placeCount}">삭제</button>
                </form>
            </td>
        </tr>
        </tbody>
    </table>
    <p th:if="${#lists.isEmpty(brands)}" class="empty-state">
        브랜드가 없습니다.
    </p>
</div>

</body>
</html>
