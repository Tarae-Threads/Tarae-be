<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{admin/layout/base :: layout('장소 제보 검수', ~{::body})}">
<body>

<!-- 처리된 제보 안내 -->
<div th:if="${request.status != T(com.taraethreads.tarae.request.domain.RequestStatus).PENDING}"
     class="alert alert-warning">
    이미 <strong th:text="${request.status}">처리됨</strong> 상태인 제보입니다. 재처리할 수 없습니다.
</div>

<div class="detail-grid">

    <!-- 좌측: 제보 원본 -->
    <div class="card">
        <div class="detail-section-title">제보 원본</div>

        <div class="field-group">
            <div class="field-label">제보 유형</div>
            <div class="field-value" th:text="${request.requestType}">NEW</div>
        </div>
        <div class="field-group">
            <div class="field-label">장소명</div>
            <div class="field-value" th:text="${request.name ?: '-'}">-</div>
        </div>
        <div class="field-group">
            <div class="field-label">주소</div>
            <div class="field-value" th:text="${request.address ?: '-'}">-</div>
        </div>
        <div class="field-group">
            <div class="field-label">상세주소</div>
            <div class="field-value" th:text="${request.addressDetail ?: '-'}">-</div>
        </div>
        <div class="field-group">
            <div class="field-label">위도/경도</div>
            <div class="field-value"
                 th:text="${request.lat != null ? request.lat + ' / ' + request.lng : '-'}">-</div>
        </div>
        <div class="field-group">
            <div class="field-label">영업시간</div>
            <div class="field-value" th:text="${request.hoursText ?: '-'}">-</div>
        </div>
        <div class="field-group">
            <div class="field-label">휴무일</div>
            <div class="field-value" th:text="${request.closedDays ?: '-'}">-</div>
        </div>
        <div class="field-group">
            <div class="field-label">취급 실 브랜드</div>
            <div class="field-value" th:text="${request.brandsYarn ?: '-'}">-</div>
        </div>
        <div class="field-group">
            <div class="field-label">취급 바늘 브랜드</div>
            <div class="field-value" th:text="${request.brandsNeedle ?: '-'}">-</div>
        </div>
        <div class="field-group">
            <div class="field-label">인스타그램</div>
            <div class="field-value" th:text="${request.instagramUrl ?: '-'}">-</div>
        </div>
        <div class="field-group">
            <div class="field-label">웹사이트</div>
            <div class="field-value" th:text="${request.websiteUrl ?: '-'}">-</div>
        </div>
        <div class="field-group">
            <div class="field-label">네이버 지도</div>
            <div class="field-value" th:text="${request.naverMapUrl ?: '-'}">-</div>
        </div>
        <div class="field-group">
            <div class="field-label">태그 (자유입력)</div>
            <div class="field-value" th:text="${request.tags ?: '-'}">-</div>
        </div>
        <div class="field-group">
            <div class="field-label">메모</div>
            <div class="field-value" th:text="${request.note ?: '-'}">-</div>
        </div>
    </div>

    <!-- 우측: Place 입력 폼 -->
    <div class="card">
        <div class="detail-section-title">
            <span th:if="${request.requestType.name() == 'NEW'}">장소 등록 폼</span>
            <span th:if="${request.requestType.name() == 'UPDATE'}">장소 수정 폼</span>
        </div>

        <form th:action="@{/admin/requests/place/{id}/approve(id=${request.id})}" method="post">
            <div class="form-group">
                <label>장소명 *</label>
                <input type="text" name="name" th:value="${form.name}" required/>
            </div>
            <div class="form-group">
                <label>지역 (region) *</label>
                <input type="text" name="region" th:value="${form.region}" placeholder="예: 서울" required/>
            </div>
            <div class="form-group">
                <label>구/동 (district) *</label>
                <input type="text" name="district" th:value="${form.district}" placeholder="예: 성수동" required/>
            </div>
            <div class="form-group">
                <label>주소 *</label>
                <input type="text" name="address" th:value="${form.address}" required/>
            </div>
            <div class="form-group">
                <label>위도 (lat)</label>
                <input type="text" name="lat" th:value="${form.lat}"/>
            </div>
            <div class="form-group">
                <label>경도 (lng)</label>
                <input type="text" name="lng" th:value="${form.lng}"/>
            </div>
            <div class="form-group">
                <label>영업시간</label>
                <input type="text" name="hoursText" th:value="${form.hoursText}"/>
            </div>
            <div class="form-group">
                <label>휴무일</label>
                <input type="text" name="closedDays" th:value="${form.closedDays}"/>
            </div>
            <div class="form-group">
                <label>설명</label>
                <textarea name="description" th:text="${form.description}"></textarea>
            </div>
            <div class="form-group">
                <label>인스타그램 URL</label>
                <input type="text" name="instagramUrl" th:value="${form.instagramUrl}"/>
            </div>
            <div class="form-group">
                <label>웹사이트 URL</label>
                <input type="text" name="websiteUrl" th:value="${form.websiteUrl}"/>
            </div>
            <div class="form-group">
                <label>네이버 지도 URL</label>
                <input type="text" name="naverMapUrl" th:value="${form.naverMapUrl}"/>
            </div>

            <div class="form-group">
                <label>카테고리</label>
                <div class="checkbox-group">
                    <label th:each="cat : ${categories}" class="checkbox-label">
                        <input type="checkbox" name="categoryIds" th:value="${cat.id}"
                               th:checked="${#lists.contains(form.categoryIds, cat.id)}"/>
                        <span th:text="${cat.name}">카테고리</span>
                    </label>
                </div>
            </div>
            <div class="form-group">
                <label>태그</label>
                <div class="checkbox-group">
                    <label th:each="tag : ${tags}" class="checkbox-label">
                        <input type="checkbox" name="tagIds" th:value="${tag.id}"
                               th:checked="${#lists.contains(form.tagIds, tag.id)}"/>
                        <span th:text="${tag.name}">태그</span>
                    </label>
                </div>
            </div>
            <div class="form-group">
                <label>브랜드</label>
                <div class="checkbox-group">
                    <label th:each="brand : ${brands}" class="checkbox-label">
                        <input type="checkbox" name="brandIds" th:value="${brand.id}"
                               th:checked="${#lists.contains(form.brandIds, brand.id)}"/>
                        <span th:text="${brand.name + ' (' + brand.type + ')'}">브랜드</span>
                    </label>
                </div>
            </div>

            <div class="form-actions" th:if="${request.status == T(com.taraethreads.tarae.request.domain.RequestStatus).PENDING}">
                <button th:if="${request.requestType.name() == 'NEW'}" type="submit" class="btn btn-primary">승인 (신규 등록)</button>
                <button th:if="${request.requestType.name() == 'UPDATE'}" type="submit" class="btn btn-primary">승인 (수정 반영)</button>
            </div>
        </form>

        <!-- 거절 폼 (별도) -->
        <form th:if="${request.status == T(com.taraethreads.tarae.request.domain.RequestStatus).PENDING}"
              th:action="@{/admin/requests/place/{id}/reject(id=${request.id})}"
              method="post"
              style="margin-top: 8px; text-align: right;">
            <button type="submit" class="btn btn-destructive"
                    onclick="return confirm('정말 거절하시겠습니까?')">거절</button>
        </form>
    </div>
</div>

</body>
</html>
