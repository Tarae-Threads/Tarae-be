<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{admin/layout/base :: layout('м ңліҙ кҙҖлҰ¬', ~{::body})}">
<body>

<!-- нғӯ -->
<div class="tabs">
    <a th:href="@{/admin/requests(type='place')}"
       th:classappend="${type == 'place'} ? 'active'"
       class="tab">мһҘмҶҢ м ңліҙ</a>
    <a th:href="@{/admin/requests(type='event')}"
       th:classappend="${type == 'event'} ? 'active'"
       class="tab">мқҙлІӨнҠё м ңліҙ</a>
    <a th:href="@{/admin/requests(type='shop')}"
       th:classappend="${type == 'shop'} ? 'active'"
       class="tab">мҳЁлқјмқёмғө м ңліҙ</a>
</div>

<!-- мһҘмҶҢ/мҳЁлқјмқёмғө м ңліҙ м„ңлёҢнғӯ: м „мІҙ / мӢ к·ң / мҲҳм • -->
<div th:if="${type == 'place' or type == 'shop'}" class="filter-bar filter-bar--sub">
    <a th:href="@{/admin/requests(type=${type}, status=${status})}"
       th:classappend="${requestType == null} ? 'active'"
       class="filter-btn">м „мІҙ</a>
    <a th:href="@{/admin/requests(type=${type}, status=${status}, requestType='NEW')}"
       th:classappend="${requestType != null && requestType.name() == 'NEW'} ? 'active'"
       class="filter-btn">мӢ к·ң</a>
    <a th:href="@{/admin/requests(type=${type}, status=${status}, requestType='UPDATE')}"
       th:classappend="${requestType != null && requestType.name() == 'UPDATE'} ? 'active'"
       class="filter-btn">мҲҳм •</a>
</div>

<!-- мғҒнғң н•„н„° -->
<div class="filter-bar">
    <a th:href="@{/admin/requests(type=${type}, requestType=${requestType})}"
       th:classappend="${status == null} ? 'active'"
       class="filter-btn">м „мІҙ</a>
    <a th:each="s : ${allStatuses}"
       th:href="@{/admin/requests(type=${type}, status=${s}, requestType=${requestType})}"
       th:classappend="${status == s} ? 'active'"
       th:text="${s}"
       class="filter-btn">STATUS</a>
</div>

<!-- лӘ©лЎқ н…Ңмқҙлё” -->
<div class="card table-wrap">
    <table th:if="${not #lists.isEmpty(requests)}">
        <thead>
        <tr>
            <th>ID</th>
            <th>мқҙлҰ„</th>
            <th th:if="${type == 'place' or type == 'shop'}">мң нҳ•</th>
            <th>мғҒнғң</th>
            <th>л“ұлЎқмқј</th>
            <th>мғҒм„ё</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="req : ${requests}">
            <td th:text="${req.id}">1</td>
            <td th:text="${req.name}">мқҙлҰ„</td>
            <td th:if="${type == 'place' or type == 'shop'}">
                <span th:if="${req.requestType.name() == 'NEW'}" class="badge badge--approved">мӢ к·ң</span>
                <span th:if="${req.requestType.name() == 'UPDATE'}" class="badge badge--update">мҲҳм •</span>
            </td>
            <td>
                <span th:classappend="'badge--' + ${#strings.toLowerCase(req.status)}"
                      th:text="${req.status}"
                      class="badge">PENDING</span>
            </td>
            <td th:text="${req.createdAt != null} ? ${#temporals.format(req.createdAt, 'yy/MM/dd HH:mm')} : '-'">26/01/01 09:00</td>
            <td>
                <a th:if="${type == 'place'}"
                   th:href="@{/admin/requests/place/{id}(id=${req.id})}"
                   class="btn btn--secondary btn--sm">кІҖмҲҳ</a>
                <a th:if="${type == 'event'}"
                   th:href="@{/admin/requests/event/{id}(id=${req.id})}"
                   class="btn btn--secondary btn--sm">кІҖмҲҳ</a>
                <a th:if="${type == 'shop'}"
                   th:href="@{/admin/shop-requests/{id}(id=${req.id})}"
                   class="btn btn--secondary btn--sm">кІҖмҲҳ</a>
            </td>
        </tr>
        </tbody>
    </table>
    <p th:if="${#lists.isEmpty(requests)}" class="empty-state">
        м ңліҙк°Җ м—ҶмҠөлӢҲлӢӨ.
    </p>
</div>

</body>
</html>
